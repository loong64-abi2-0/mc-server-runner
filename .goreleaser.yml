project_name: mc-server-runner
release:
  replace_existing_artifacts: true
  github:
    owner: loong64-abi2-0
    name: mc-server-runner
brews:
  - install: |
      bin.install "mc-server-runner"
builds:
- goos:
  - linux
  goarch:
  - amd64
  - arm
  - arm64
  - loong64
  goarm:
  - "6"
  - "7"
  main: .
  env:
    - CGO_ENABLED=0
  binary: mc-server-runner
archives:
  - format_overrides:
      - goos: windows
        format: zip
changelog:
  filters:
    exclude:
      - '^ci:'
      - '^misc:'
      - '^docs:'
